<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ParkLink Individual Car Detector</title>
<style>
:root{font-family:Inter,system-ui,sans-serif;color:#eaf3ff;background:#06111f}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#12355d 0,#06111f 45%)}main{width:min(1000px,calc(100% - 32px));margin:auto;padding:42px 0 70px}.brand{font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#83bfff;font-weight:800}h1{margin:10px 0;font-size:clamp(34px,6vw,62px);line-height:1}.sub{color:#b9c9dd;font-size:18px;max-width:800px;line-height:1.5}.card{margin-top:28px;padding:24px;border:1px solid #29445f;border-radius:24px;background:#07182bd9}.drop{display:block;padding:34px;text-align:center;border:2px dashed #3977b8;border-radius:18px;cursor:pointer}.drop:hover,.drop.active{background:#4b95e014;border-color:#72b6ff}.drop strong{display:block;font-size:20px}.drop span{color:#8fa8c2}input[type=file]{display:none}.preview{width:100%;max-height:520px;object-fit:contain;border-radius:15px;background:#02070c;margin-top:16px}.preview[hidden],#result[hidden]{display:none}.controls{display:flex;gap:18px;align-items:end;flex-wrap:wrap;margin-top:20px}.slider{flex:1;min-width:220px}.slider small{display:block;color:#9eb3cb;margin-bottom:7px}input[type=range]{width:100%}button{border:0;border-radius:14px;padding:15px 22px;font-size:16px;font-weight:850;background:#68b5ff;color:#04101d;cursor:pointer}button:disabled{opacity:.55}.status{min-height:25px;margin-top:16px;color:#b9c9dd}.error{color:#ff9c9c}.resultHead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-top:25px}.count{font-size:clamp(30px,5vw,50px);font-weight:900;margin:0}.pill{border:1px solid #68b5ff66;border-radius:999px;padding:8px 13px;color:#91c9ff}#resultImage{width:100%;max-height:700px;object-fit:contain;border-radius:18px;background:#02070c;margin-top:18px}footer{margin-top:14px;color:#7890aa}
</style></head><body><main>
<div class="brand">ParkLink · Street Sweeper Test</div><h1>Find and separate individual cars.</h1>
<p class="sub">Paste one street photo. The detector estimates the road surface, finds large objects, and then splits touching regions into individual car-sized candidates. Click, drag, or press Ctrl+V.</p>
<section class="card"><form id="form" novalidate>
<label class="drop" id="dropZone" for="imageInput"><strong id="fileLabel">Click, drop, or paste a street image</strong><span>JPG, PNG, or WEBP · Ctrl+V supported</span></label>
<input id="imageInput" type="file" accept="image/jpeg,image/png,image/webp"><img id="preview" class="preview" hidden>
<div class="controls">
<label class="slider"><small>Detection sensitivity: <span id="sensitivityText">55</span></small><input id="sensitivity" type="range" min="10" max="90" value="55" step="5"></label>
<label class="slider"><small>Minimum car size: <span id="areaText">0.25%</span></small><input id="minArea" type="range" min="0.03" max="2" value="0.25" step="0.02"></label>
<button id="button" type="submit">Count cars</button></div></form><div id="status" class="status"></div>
<section id="result" hidden><div class="resultHead"><p class="count"><span id="count">0</span> individual car(s)</p><span class="pill"><span id="percent">0</span>% covered</span></div><img id="resultImage"><footer id="note"></footer></section>
</section></main>
<script>
const form=document.getElementById('form'),input=document.getElementById('imageInput'),preview=document.getElementById('preview'),dropZone=document.getElementById('dropZone'),fileLabel=document.getElementById('fileLabel'),statusEl=document.getElementById('status'),result=document.getElementById('result'),button=document.getElementById('button'),sensitivity=document.getElementById('sensitivity'),minArea=document.getElementById('minArea');let selectedFile=null,previewUrl=null;
function setFile(file){if(!file||!file.type.startsWith('image/')){statusEl.className='status error';statusEl.textContent='Choose or paste an image file.';return}selectedFile=file;fileLabel.textContent=file.name||'Pasted image';if(previewUrl)URL.revokeObjectURL(previewUrl);previewUrl=URL.createObjectURL(file);preview.src=previewUrl;preview.hidden=false;result.hidden=true;statusEl.className='status';statusEl.textContent='Image ready.'}
input.onchange=()=>setFile(input.files[0]);
document.addEventListener('paste',e=>{const item=[...(e.clipboardData?.items||[])].find(x=>x.type.startsWith('image/'));if(!item)return;e.preventDefault();const file=item.getAsFile();if(file){const ext=file.type.split('/')[1]||'png';setFile(new File([file],`pasted-image.${ext}`,{type:file.type}))}});
['dragenter','dragover'].forEach(type=>dropZone.addEventListener(type,e=>{e.preventDefault();dropZone.classList.add('active')}));['dragleave','drop'].forEach(type=>dropZone.addEventListener(type,e=>{e.preventDefault();dropZone.classList.remove('active')}));dropZone.addEventListener('drop',e=>setFile(e.dataTransfer.files[0]));
sensitivity.oninput=()=>document.getElementById('sensitivityText').textContent=sensitivity.value;minArea.oninput=()=>document.getElementById('areaText').textContent=Number(minArea.value).toFixed(2)+'%';
form.onsubmit=async e=>{e.preventDefault();if(!selectedFile){statusEl.className='status error';statusEl.textContent='Choose or paste an image first.';return}button.disabled=true;button.textContent='Separating…';statusEl.className='status';statusEl.textContent='Finding road interference and separating connected cars…';result.hidden=true;try{const fd=new FormData();fd.append('image',selectedFile,selectedFile.name||'street-image.jpg');fd.append('sensitivity',sensitivity.value);fd.append('min_area',minArea.value);const r=await fetch('/detect',{method:'POST',body:fd});const raw=await r.text();let data={};try{data=raw?JSON.parse(raw):{}}catch{}if(!r.ok)throw new Error(data.error||'Detection failed.');document.getElementById('count').textContent=data.count;document.getElementById('percent').textContent=data.covered_percent;document.getElementById('resultImage').src=data.annotated_image;document.getElementById('note').textContent=data.note;statusEl.textContent=`Finished. ${data.count} individual car candidate(s) found.`;result.hidden=false}catch(err){statusEl.className='status error';statusEl.textContent=err.message||'Detection failed.'}finally{button.disabled=false;button.textContent='Count cars'}};
</script></body></html>
