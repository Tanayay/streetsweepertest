<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ParkLink Street Vehicle Counter</title>
  <style>
    :root { font-family: Inter, system-ui, sans-serif; color: #eaf3ff; background: #06111f; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #12355d 0, #06111f 45%); }
    main { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 48px 0 72px; }
    .brand { font-size: 14px; letter-spacing: .16em; text-transform: uppercase; color: #83bfff; font-weight: 800; }
    h1 { margin: 10px 0 10px; font-size: clamp(34px, 6vw, 64px); line-height: .98; }
    .sub { max-width: 680px; color: #b9c9dd; font-size: 18px; line-height: 1.55; }
    .card { margin-top: 30px; padding: 24px; border: 1px solid rgba(141,195,255,.2); border-radius: 24px; background: rgba(7,24,43,.82); box-shadow: 0 24px 80px rgba(0,0,0,.35); backdrop-filter: blur(12px); }
    .drop { display: block; padding: 40px 22px; text-align: center; border: 2px dashed #3977b8; border-radius: 18px; cursor: pointer; transition: .2s ease; }
    .drop:hover, .drop.active { border-color: #72b6ff; background: rgba(75,149,224,.08); }
    input[type=file] { display: none; }
    .controls { display: flex; gap: 14px; align-items: end; margin-top: 18px; flex-wrap: wrap; }
    .slider { flex: 1; min-width: 220px; }
    label small { display:block; color:#9eb3cb; margin-bottom:8px; }
    input[type=range] { width:100%; }
    button { border:0; border-radius:14px; padding:14px 20px; font-size:16px; font-weight:800; color:#04101d; background:#68b5ff; cursor:pointer; }
    button:disabled { opacity:.55; cursor:wait; }
    #preview, #resultImage { width:100%; max-height:650px; object-fit:contain; border-radius:18px; background:#02070c; margin-top:20px; }
    #preview[hidden], #result[hidden] { display:none; }
    .status { min-height:24px; margin-top:16px; color:#b9c9dd; }
    .error { color:#ff9c9c; }
    .count { font-size:clamp(30px,5vw,52px); font-weight:900; margin: 0; }
    .resultHead { display:flex; justify-content:space-between; align-items:center; gap:15px; flex-wrap:wrap; margin-top:26px; }
    .pill { border:1px solid rgba(104,181,255,.4); border-radius:999px; padding:8px 12px; color:#91c9ff; }
    footer { margin-top:20px; color:#7890aa; font-size:13px; }
  </style>
</head>
<body>
<main>
  <div class="brand">ParkLink · Street Sweeper Test</div>
  <h1>Count vehicles from a street photo.</h1>
  <p class="sub">Click, drag, or paste a street image with Ctrl+V. The detector marks visible cars, trucks, buses, and motorcycles and returns a total.</p>

  <section class="card">
    <form id="form">
      <label class="drop" id="dropZone" for="imageInput" tabindex="0">
        <strong id="fileLabel">Click, drop, or paste a street image</strong><br>
        <span style="color:#8fa8c2">JPG, PNG, or WEBP · maximum 15 MB · Ctrl+V supported</span>
      </label>
      <input id="imageInput" name="image" type="file" accept="image/jpeg,image/png,image/webp" required>
      <img id="preview" alt="Selected street image preview" hidden>

      <div class="controls">
        <label class="slider">
          <small>Detection confidence: <span id="confidenceText">35%</span></small>
          <input id="confidence" name="confidence" type="range" min="0.10" max="0.90" value="0.35" step="0.05">
        </label>
        <button id="submitButton" type="submit">Count vehicles</button>
      </div>
    </form>
    <div id="status" class="status"></div>

    <section id="result" hidden>
      <div class="resultHead">
        <p class="count"><span id="count">0</span> vehicles detected</p>
        <span class="pill">AI marked image</span>
      </div>
      <img id="resultImage" alt="Street image with detected vehicles marked">
      <footer id="note"></footer>
    </section>
  </section>
</main>
<script>
  const form = document.getElementById('form');
  const input = document.getElementById('imageInput');
  const preview = document.getElementById('preview');
  const fileLabel = document.getElementById('fileLabel');
  const dropZone = document.getElementById('dropZone');
  const confidence = document.getElementById('confidence');
  const confidenceText = document.getElementById('confidenceText');
  const button = document.getElementById('submitButton');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  let selectedFile = null;
  let previewUrl = null;

  confidence.addEventListener('input', () => {
    confidenceText.textContent = `${Math.round(Number(confidence.value) * 100)}%`;
  });

  function selectFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      status.className = 'status error';
      status.textContent = 'Paste or choose a JPG, PNG, or WEBP image.';
      return;
    }
    if (file.size > 15 * 1024 * 1024) {
      status.className = 'status error';
      status.textContent = 'That image is larger than 15 MB.';
      return;
    }
    selectedFile = file;
    fileLabel.textContent = file.name || 'Pasted image';
    if (previewUrl) URL.revokeObjectURL(previewUrl);
    previewUrl = URL.createObjectURL(file);
    preview.src = previewUrl;
    preview.hidden = false;
    result.hidden = true;
    status.className = 'status';
    status.textContent = 'Image ready.';
  }

  input.addEventListener('change', () => selectFile(input.files[0]));

  document.addEventListener('paste', (event) => {
    const items = [...(event.clipboardData?.items || [])];
    const imageItem = items.find(item => item.type.startsWith('image/'));
    if (!imageItem) return;
    event.preventDefault();
    const pastedFile = imageItem.getAsFile();
    if (pastedFile) {
      const extension = pastedFile.type.split('/')[1] || 'png';
      selectFile(new File([pastedFile], `pasted-image.${extension}`, { type: pastedFile.type }));
    }
  });

  ['dragenter', 'dragover'].forEach(type => dropZone.addEventListener(type, event => {
    event.preventDefault();
    dropZone.classList.add('active');
  }));
  ['dragleave', 'drop'].forEach(type => dropZone.addEventListener(type, event => {
    event.preventDefault();
    dropZone.classList.remove('active');
  }));
  dropZone.addEventListener('drop', event => selectFile(event.dataTransfer.files[0]));

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    if (!selectedFile) {
      status.className = 'status error';
      status.textContent = 'Choose or paste an image first.';
      return;
    }

    button.disabled = true;
    button.textContent = 'Analyzing…';
    status.className = 'status';
    status.textContent = 'Loading the model and checking the image. The first run may take a minute.';
    result.hidden = true;

    try {
      const payload = new FormData();
      payload.append('image', selectedFile, selectedFile.name || 'street-image.jpg');
      payload.append('confidence', confidence.value);
      const response = await fetch('/detect', { method: 'POST', body: payload });
      const raw = await response.text();
      let data = {};
      try { data = raw ? JSON.parse(raw) : {}; } catch (_) {}
      if (!response.ok) throw new Error(data.error || `Detection failed (${response.status}).`);
      if (!data.annotated_image) throw new Error('The server stopped before finishing. Try once more; the free server may still be loading the model.');

      document.getElementById('count').textContent = data.count;
      document.getElementById('resultImage').src = data.annotated_image;
      document.getElementById('note').textContent = data.note;
      status.textContent = `Finished. ${data.detections.length} qualifying vehicle detections were found.`;
      result.hidden = false;
    } catch (error) {
      status.className = 'status error';
      status.textContent = error.message || 'Detection failed. Please try again.';
    } finally {
      button.disabled = false;
      button.textContent = 'Count vehicles';
    }
  });
</script>
</body>
</html>
